services:
  icecast:
    image: deepcomp/icecast2
    container_name: radio-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_ADMIN_PASSWORD=admin
      - ICECAST_PASSWORD=hackme
      - ICECAST_RELAY_PASSWORD=hackme
      - ICECAST_HOSTNAME=localhost
    networks:
      - radio-net

  radio:
    build: .
    container_name: radio-locale
    restart: unless-stopped
    depends_on:
      - ollama
      - icecast
    environment:
      - OLLAMA_HOST=http://radio-ollama:11434
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_MOUNT=/radio
    volumes:
      - ./:/radio/
    networks:
      - radio-net

  web:
    image: nginx:alpine
    container_name: radio-web
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./radio-generator:/data/radio-gen
      - ./podcast-generator:/data/podcasts
      - ./status.json:/data/status.json
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - radio-net

  ollama:
    image: ollama/ollama
    container_name: radio-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - radio-net
    entrypoint: ["/bin/sh", "-c", "ollama serve & until ollama list > /dev/null 2>&1; do echo 'Waiting...'; sleep 2; done && ollama pull gemma3n && wait"]

networks:
  radio-net:
    driver: bridge

volumes:
  ollama_data:
