<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio DEV</title>
    <style>
        /* Variables de design pour une maintenance facile */
        :root {
            --bg-dark: #0f0f12;
            --card-bg: #1a1a20;
            --accent: #bb86fc;
            --secondary: #03dac6;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 20% 30%, #251a3a 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .player-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- Header & Badge --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }

        #metadata {
            font-size: 0.75rem;
            background: rgba(187, 134, 252, 0.15);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* --- Album Art & Track Info --- */
        .album-art {
            background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
            margin: 0 auto 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            width: 60vw;
            max-width: 240px;
            aspect-ratio: 1 / 1;
            font-size: clamp(2rem, 5vw, 4rem);
        }

        .track-info { margin-bottom: 25px; }
        #track-title { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 700; margin-bottom: 6px; display: block; }
        #track-artist { font-size: clamp(0.9rem, 3vw, 1rem); color: var(--accent); display: block; }

        /* --- Progress Bar --- */
        .progress-container {
            width: 100%;
            margin-bottom: 30px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            width: 0%; /* Départ à zéro */
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            border-radius: 3px;
            /* Ne pas mettre de transition CSS ici pour éviter les conflits avec le JS */
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* --- Controls --- */
        .controls { display: flex; flex-direction: column; gap: 20px; align-items: center; }

        #play-btn {
            background: var(--accent);
            color: #121212;
            border: none;
            width: clamp(55px, 15vw, 70px);
            height: clamp(55px, 15vw, 70px);
            border-radius: 50%;
            font-size: 0; /* On cache le texte pour une icône plus tard ou un style rond */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
        }
        
        /* Simuler une icône Play/Pause avec CSS pur */
        #play-btn::before {
            content: '';
            display: block;
            width: 0; height: 0;
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #121212;
            margin-left: 5px;
        }

        #play-btn.playing::before {
            width: 6px; height: 6px;
            background: black;
            margin: 0;
        }

        #play-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        #play-btn:active { transform: scale(0.95); }

        #subtitles {
            min-height: 3em;
            margin-top: 30px;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--secondary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        #debug {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            color: #444;
        }
        /* --- Volume Control --- */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            width: 100%;
            max-width: 200px;
        }

        .volume-icon {
            font-size: 1.2rem;
            color: var(--text-dim);
        }

        #volume-slider {
            -webkit-appearance: none; /* Pour Chrome, Safari, Edge */
            appearance: none;         /* Propriété standard pour Firefox et futurs navigateurs */
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        /* --- Style du curseur pour WebKit (Chrome, Safari, Edge) --- */
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: var(--secondary);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(3, 218, 198, 0.5);
            transition: transform 0.2s;
            border: none; /* Important pour Firefox */
        }

        /* --- Style du curseur pour Firefox --- */
        #volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--secondary);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(3, 218, 198, 0.5);
            transition: transform 0.2s;
            border: none;
        }

        /* --- État Hover pour les deux moteurs --- */
        #volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        #volume-slider::-moz-range-thumb:hover {
            transform: scale(1.3);
        }
        @media (max-width: 768px) {
            .player-card {
                padding: 25px;
                border-radius: 18px;
            }

            .album-art {
                width: 200px;
                height: 200px;
                font-size: 3rem;
            }

            #track-title {
                font-size: 1.3rem;
            }

            #track-artist {
                font-size: 0.95rem;
            }
        }

        /* Mobiles */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .player-card {
                padding: 20px;
                border-radius: 16px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .album-art {
                width: 160px;
                height: 160px;
                font-size: 2.5rem;
            }

            #track-title {
                font-size: 1.1rem;
            }

            #track-artist {
                font-size: 0.9rem;
            }

            #play-btn {
                width: 60px;
                height: 60px;
            }

            .volume-container {
                max-width: 100%;
            }

            #subtitles {
                font-size: 0.9rem;
                min-height: 2.5em;
            }
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="header">
        <h1>Direct</h1>
        <div id="metadata">Connexion...</div>
    </div>

    <div class="album-art" id="cover-art">📻</div>

    <div class="track-info">
        <span id="track-title">Titre de l'émission</span>
        <span id="track-artist">Nom de l'artiste</span>
    </div>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-info">
            <span id="current-time">LIVE</span>
            <span id="duration">--:--</span>
        </div>
    </div>

    <div class="controls">
        <audio id="radio-audio" preload="auto" crossorigin="anonymous">
            <source src="/icecast/radio" type="audio/mpeg">
        </audio>

        <button id="play-btn" onclick="togglePlay()"></button>
        <div class="volume-container">
            <span class="volume-icon">🔈</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            <span class="volume-icon">🔊</span>
        </div>
    </div>

    <div id="subtitles"></div>
    <div id="debug"></div>
</div>
<script>
const audio    = document.getElementById('radio-audio');
const subDiv   = document.getElementById('subtitles');
const debugDiv = document.getElementById('debug');
const playBtn  = document.getElementById('play-btn');
const artist   = document.getElementById('track-artist');
const title    = document.getElementById('track-title');
const time     = document.getElementById('current-time');
const duration = document.getElementById('duration');
const progressFill = document.getElementById('progress-fill');

let displayedPodcastData = null;
let currentPodcastData = null;
let cuesIndex          = [];
let hasSubtitles       = false;
let lastTrackTitle     = "";
let isFetching         = false;
let lastPodcastUrl     = ""; 

// VARIABLES DE SYNCHRO
let serverStartTime    = 0; 
let playClickTime      = 0; 
let offsetAtPlay       = 0; 
let userOffsetCorrection = -4.096;
let baseServerNow = 0;
let baseLocalTime = 0;

function adjSync(val) {
    userOffsetCorrection += val;
}

function normalizeVtt(url) {
    return url ? url.split('?')[0] : '';
}

function parseVttTime(t) {
    const p = t.trim().replace(',', '.').split(':').map(Number);
    if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
    return p[0] * 60 + p[1];
}

function parseVTT(vttText) {
    const cues = [];
    const blocks = vttText.split(/\n\s*\n/);
    blocks.forEach(block => {
        const lines = block.split('\n').map(l => l.trim());
        const timeLine = lines.find(l => l.includes('-->'));
        if (timeLine) {
            const [startStr, endStr] = timeLine.split('-->');
            const start = parseVttTime(startStr);
            const end = parseVttTime(endStr);
            const textIdx = lines.indexOf(timeLine) + 1;
            const text = lines.slice(textIdx).join(' ').trim();
            if (text) cues.push({ start, end, text });
        }
    });
    return cues;
}

function togglePlay() {
    if (audio.paused) {
        if (currentPodcastData) {
            playClickTime = Date.now() / 1000;
            const start = new Date(currentPodcastData.startedAt).getTime() / 1000;
            const secondsSinceFetch = playClickTime - currentPodcastData.fetchedAt;
            offsetAtPlay = (currentPodcastData.serverNow + secondsSinceFetch) - start;
        }
        playBtn.classList.add('playing');
        audio.src = '/icecast/radio?v=' + Date.now();
        audio.play()
    } else {
        audio.pause();
        playBtn.classList.remove('playing');
        subDiv.innerHTML = "";        // ← vider immédiatement
    }
}

async function fetchMetadata() {
    if (isFetching) return;
    isFetching = true;
    try {
        const res = await fetch('/data/status.json?t=' + Date.now());
        const data = await res.json();
        
        const prevVtt = normalizeVtt(currentPodcastData?.vtt);
        currentPodcastData = data;
        baseServerNow = data.serverNow;
        baseLocalTime = Date.now() / 1000;

        // Si changement de morceau
        if (data.title !== lastTrackTitle || normalizeVtt(data.vtt) !== prevVtt) {
            lastTrackTitle = data.title;
            const delay = Math.abs(userOffsetCorrection) * 1000;
            
            setTimeout(async () => {
                displayedPodcastData = data; 
                updateUI(data);

                // Charger le VTT SEULEMENT au moment où l'affichage bascule
                if (data.vtt) {
                    hasSubtitles = true;
                    const vttRes = await fetch(data.vtt);
                    const vttText = await vttRes.text();
                    cuesIndex = parseVTT(vttText);
                } else {
                    hasSubtitles = false;
                    cuesIndex = [];
                }
            }, delay);
        } else if(!data.vtt) {
            hasSubtitles = false;
            cuesIndex = [];
        }
    } catch (e) { console.error("Metadata Error:", e); }
    finally { isFetching = false; }
}

function animate() {
    // On utilise displayedPodcastData en priorité pour l'affichage
    const activeData = displayedPodcastData || currentPodcastData;

    if (activeData) {
        const now = Date.now() / 1000;
        const elapsed = now - baseLocalTime;
        
        // On calcule la position basée sur l'heure de début de la musique AFFICHÉE
        const start = new Date(activeData.startedAt).getTime() / 1000;
        
        // On utilise le serverNow du moment du fetch
        let currentPos = (baseServerNow + elapsed) - start + userOffsetCorrection;

        const durationRaw = activeData.duration_raw || 1;

        // Clamp pour éviter les valeurs bizarres en fin de morceau
        currentPos = Math.max(0, Math.min(currentPos, durationRaw));

        // Mise à jour de l'UI
        progressFill.style.width = (currentPos / durationRaw) * 100 + "%";
        time.innerText = formatTime(currentPos);
        duration.innerText = activeData.duration || "--:--";

        // Sous-titres : utilisez aussi activeData
        if (hasSubtitles && cuesIndex.length > 0 && !audio.paused) {
            const currentCue = cuesIndex.find(cue => currentPos >= cue.start && currentPos <= cue.end);
            const newText = currentCue ? currentCue.text : "";
            if (subDiv.innerHTML !== newText) {
                subDiv.innerHTML = newText;
            }
        } else if (!hasSubtitles || displayedPodcastData?.event === "Musique") {
            // On vide cuesIndex seulement quand la position a dépassé la durée
            const activeData = displayedPodcastData || currentPodcastData;
            const durationRaw = activeData?.duration_raw || 0;
            if (currentPos >= durationRaw || audio.paused) {
                if (subDiv.innerHTML !== "") {
                    subDiv.innerHTML = "";
                    cuesIndex = []; // nettoyage final ici
                }
            }
        }
    }
    requestAnimationFrame(animate);
}
function updateUI(data) {
    title.innerText  = data.title  || "Titre inconnu";
    artist.innerText = data.artist || "Artiste inconnu";
    document.getElementById('metadata').textContent = data.event;
    lastTrackTitle = data.title;

    // ✅ NOUVEAU : réinitialiser la synchro à chaque changement de track
    if (!audio.paused) {
        playClickTime = Date.now() / 1000;
        const start = new Date(data.startedAt).getTime() / 1000;
        offsetAtPlay  = data.serverNow - start;
    }
}

function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

const volumeSlider = document.getElementById('volume-slider');
volumeSlider.addEventListener('input', (e) => audio.volume = e.target.value);

async function start() {
    audio.src = '/icecast/radio?v=' + Date.now();
    audio.load();
    fetchMetadata();
    animate();
    const res = await fetch('/data/status.json?t=' + Date.now());
    const data = await res.json();
    data.fetchedAt = Date.now() / 1000;  // ← heure locale au moment du fetch
    updateUI(data);
    displayedPodcastData = data;
}

setInterval(fetchMetadata, 1000);
start();
</script>
</body>
</html>
